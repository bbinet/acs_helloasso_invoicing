version: "3.8"
services:
  api:
    image: python:3.11-slim
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - CONF_PATH=/app/conf.json
      - DASHBOARD_PASSWORD=dev
    command: >
      bash -c "pip install -r requirements.txt -q &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
